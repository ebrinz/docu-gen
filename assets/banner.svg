<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c518"/>
      <stop offset="100%" style="stop-color:#e0a800"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ec9a7"/>
      <stop offset="100%" style="stop-color:#2ba88a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative film strip left -->
  <g opacity="0.15">
    <rect x="30" y="40" width="60" height="220" rx="4" fill="none" stroke="#f5c518" stroke-width="1.5"/>
    <rect x="38" y="55" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="75" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="95" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="115" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="135" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="155" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="175" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="195" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="215" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="38" y="235" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="55" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="75" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="95" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="115" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="135" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="155" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="175" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="195" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="215" width="12" height="8" rx="1" fill="#f5c518"/>
    <rect x="70" y="235" width="12" height="8" rx="1" fill="#f5c518"/>
  </g>

  <!-- Decorative waveform right -->
  <g opacity="0.12" transform="translate(1060, 150)">
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="-65" x2="10" y2="65" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-30" x2="20" y2="30" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="-80" x2="30" y2="80" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="-50" x2="40" y2="50" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="-70" x2="50" y2="70" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="-25" x2="60" y2="25" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="-55" x2="70" y2="55" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="-35" x2="80" y2="35" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="-60" x2="90" y2="60" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Pipeline arrows -->
  <g transform="translate(180, 230)" filter="url(#glow)">
    <text x="0" y="0" font-family="monospace" font-size="13" fill="#888899" letter-spacing="2">
      PDF
    </text>
    <line x1="40" y1="-5" x2="70" y2="-5" stroke="#f5c518" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="80" y="0" font-family="monospace" font-size="13" fill="#f5c518" letter-spacing="1">
      plan
    </text>
    <line x1="130" y1="-5" x2="160" y2="-5" stroke="#888899" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="170" y="0" font-family="monospace" font-size="13" fill="#f5c518" letter-spacing="1">
      narrate
    </text>
    <line x1="245" y1="-5" x2="275" y2="-5" stroke="#888899" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="285" y="0" font-family="monospace" font-size="13" fill="#f5c518" letter-spacing="1">
      render
    </text>
    <line x1="355" y1="-5" x2="385" y2="-5" stroke="#888899" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="395" y="0" font-family="monospace" font-size="13" fill="#f5c518" letter-spacing="1">
      stitch
    </text>
    <line x1="460" y1="-5" x2="490" y2="-5" stroke="#3ec9a7" stroke-width="1.5"/>
    <text x="500" y="0" font-family="monospace" font-size="13" fill="#3ec9a7" letter-spacing="2">
      MP4
    </text>
  </g>

  <!-- Main title -->
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="url(#gold)" filter="url(#glow)" letter-spacing="-1">
    docu-gen
  </text>

  <!-- Subtitle -->
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#888899" letter-spacing="4">
    PDF SPEC TO DOCUMENTARY VIDEO
  </text>

  <!-- MCP badge -->
  <g transform="translate(600, 185)">
    <rect x="-55" y="-14" width="110" height="26" rx="13" fill="none" stroke="#3ec9a7" stroke-width="1.2" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#3ec9a7" letter-spacing="2">MCP SERVER</text>
  </g>
</svg>
